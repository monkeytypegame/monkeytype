<div class="page pageTest full-width content-grid hidden" data-nosnippet>
  <mount data-component="testconfig" class="full-width"></mount>

  <div id="testInitFailed" class="content-grid hidden">
    <div class="message">
      <div class="text">
        Test initialization failed. Please try different settings or refreshing
        the page. If the problem persists, please contact support.
      </div>
      <div class="error"></div>
      <button class="active restart">
        <i class="fas fa-fw fa-redo-alt"></i>
        Restart
      </button>
    </div>
  </div>
  <div id="typingTest" class="content-grid full-width-padding">
    <mount data-component="capswarning"></mount>
    <div id="memoryTimer">Time left to memorise all words: 0s</div>
    <div id="layoutfluidTimer">Time left to memorise all words: 0s</div>
    <mount data-component="testmodesnotice"></mount>

    <mount data-component="livestatstexttop"></mount>
    <mount data-component="livestatsmini" class="full-width"></mount>
    <div id="wordsWrapper" class="content-grid full-width" translate="no">
      <textarea
        id="wordsInput"
        class="full-width"
        autocomplete="off"
        autocapitalize="off"
        autocapitalize="none"
        autocorrect="off"
        data-gramm="false"
        data-gramm_editor="false"
        data-enable-grammarly="false"
        data-bwignore
        data-1p-ignore
        data-lpignore="true"
        data-form-type="other"
        list="autocompleteOff"
        spellcheck="false"
      ></textarea>
      <mount data-component="outoffocuswarning" class="contents"></mount>
      <div id="paceCaret" class="full-width default hidden"></div>
      <div id="caret" class="full-width default"></div>
      <div id="words" class="full-width"></div>
    </div>

    <mount data-component="compositiondisplay"></mount>
    <mount data-component="keymap"></mount>
    <mount data-component="monkey"></mount>

    <button
      id="restartTestButton"
      aria-label="Restart Test"
      data-balloon-pos="down"
      class="text"
    >
      <i class="fas fa-fw fa-redo-alt"></i>
    </button>
    <mount data-component="livestatstextbottom"></mount>
    <mount data-component="premid"></mount>
  </div>
  <div class="loading hidden">
    <i class="fas fa-circle-notch fa-spin"></i>
  </div>
  <load src="./test-result.html" />
</div>
